<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVODA Trading Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

body{
background:#050505;
color:white;
font-family:Orbitron;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#111;
border-bottom:1px solid #222;
}

.container{
display:grid;
grid-template-columns:3fr 1fr;
gap:10px;
padding:10px;
}

.panel{
background:#0e0e0e;
padding:12px;
border-radius:8px;
border:1px solid #222;
}

h3{
margin-top:0;
}

input,select{
width:100%;
background:#111;
border:1px solid #333;
color:white;
padding:6px;
margin-top:5px;
}

button{
margin-top:6px;
padding:7px;
cursor:pointer;
border:none;
}

.buy{background:#16c784;color:black;}
.sell{background:#ea3943;color:white;}

table{
width:100%;
border-collapse:collapse;
font-family:JetBrains Mono;
}

td,th{
padding:6px;
border-bottom:1px solid #222;
font-size:12px;
}

#chart{
height:520px;
}

#chatBox{
height:150px;
overflow-y:auto;
background:#000;
padding:6px;
}

</style>
</head>

<body>

<header>

<div>AVODA TERMINAL</div>

<div>
Balance $<span id="balance">50</span> |
Equity $<span id="equity">50</span>
</div>

</header>

<div class="container">

<!-- CHART -->
<div class="panel">

<h3>Trading Chart</h3>
<div id="chart"></div>

</div>

<!-- TRADE PANEL -->
<div class="panel">

<h3>Trade Execution</h3>

<label>Pair</label>
<select id="pair">

<option value="BINANCE:BTCUSDT">BTCUSDT</option>
<option value="BINANCE:ETHUSDT">ETHUSDT</option>
<option value="BINANCE:SOLUSDT">SOLUSDT</option>
<option value="BINANCE:BNBUSDT">BNBUSDT</option>
<option value="BINANCE:XRPUSDT">XRPUSDT</option>

<option value="OANDA:EURUSD">EURUSD</option>
<option value="OANDA:GBPUSD">GBPUSD</option>
<option value="OANDA:USDJPY">USDJPY</option>

<option value="FOREXCOM:XAUUSD">GOLD</option>
<option value="FOREXCOM:XAGUSD">SILVER</option>

<option value="NASDAQ:NDX">NASDAQ</option>
<option value="SP:SPX">SP500</option>

</select>

<label>Lot Size</label>
<input id="lot" value="0.01">

<label>Leverage</label>
<input id="lev" value="100">

<label>Entry Price</label>
<input id="price">

<label>Stop Loss</label>
<input id="sl">

<label>Take Profit</label>
<input id="tp">

<button class="buy" onclick="openTrade('BUY')">BUY</button>
<button class="sell" onclick="openTrade('SELL')">SELL</button>

<div id="marginInfo"></div>

</div>

<!-- OPEN POSITIONS -->
<div class="panel">

<h3>Open Positions</h3>

<table>

<thead>
<tr>
<th>Pair</th>
<th>Type</th>
<th>Entry</th>
<th>PnL</th>
</tr>
</thead>

<tbody id="positions"></tbody>

</table>

</div>

<!-- WATCHLIST -->
<div class="panel">

<h3>Market Watchlist</h3>

<table id="watchlist"></table>

</div>

<!-- HEATMAP -->
<div class="panel">

<h3>Top Crypto Movers</h3>

<table id="heatmap"></table>

</div>

<!-- TRADE HISTORY -->
<div class="panel">

<h3>Trade History</h3>

<table>

<thead>
<tr>
<th>Pair</th>
<th>Result</th>
<th>PnL</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<!-- FEAR GREED -->
<div class="panel">

<h3>Fear & Greed Index</h3>

<div id="fear"></div>

</div>

<!-- ECONOMIC CALENDAR -->
<div class="panel">

<h3>Economic Calendar</h3>

<iframe src="https://tradingeconomics.com/calendar/widget?c=unitedstates"
width="100%" height="300"></iframe>

</div>

<!-- AI TRADE ANALYSIS -->
<div class="panel">

<h3>AI Trade Assistant</h3>

<textarea id="aiInput" style="width:100%;height:60px"></textarea>

<button onclick="analyze()">Analyze</button>

<div id="aiResult"></div>

</div>

<!-- CHAT -->
<div class="panel">

<h3>Trader Chat</h3>

<div id="chatBox"></div>

<input id="chatName" placeholder="Name">
<input id="chatMsg" placeholder="Message">

<button onclick="sendChat()">Send</button>

</div>

</div>

<!-- TRADINGVIEW CHART -->
<script src="https://s3.tradingview.com/tv.js"></script>

<script>

new TradingView.widget({
container_id:"chart",
symbol:"BINANCE:BTCUSDT",
interval:"15",
theme:"dark",
style:"1",
autosize:true
})

</script>

<!-- MARKET DATA -->
<script>

async function loadWatchlist(){

let res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd")

let data=await res.json()

document.getElementById("watchlist").innerHTML=

`<tr><td>BTC</td><td>$${data.bitcoin.usd}</td></tr>
<tr><td>ETH</td><td>$${data.ethereum.usd}</td></tr>`

}

loadWatchlist()
setInterval(loadWatchlist,10000)

</script>

<!-- HEATMAP -->
<script>

async function heatmap(){

let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=6&page=1")

let coins=await res.json()

let html=""

coins.forEach(c=>{

html+=`<tr>
<td>${c.symbol.toUpperCase()}</td>
<td>${c.price_change_percentage_24h.toFixed(2)}%</td>
</tr>`

})

document.getElementById("heatmap").innerHTML=html

}

heatmap()

</script>

<!-- FEAR GREED -->
<script>

async function fear(){

let res=await fetch("https://api.alternative.me/fng/")

let d=await res.json()

document.getElementById("fear").innerHTML=d.data[0].value+"/100"

}

fear()

</script>

<!-- TRADING ENGINE -->
<script>

let balance=50
let positions=[]
let history=[]

function openTrade(type){

let pair=document.getElementById("pair").value
let price=parseFloat(document.getElementById("price").value)
let lot=parseFloat(document.getElementById("lot").value)
let lev=parseFloat(document.getElementById("lev").value)

let margin=(price*lot)/lev

document.getElementById("marginInfo").innerHTML="Margin Required: $"+margin.toFixed(2)

positions.push({pair,type,price,pnl:0})

renderPositions()

}

function renderPositions(){

let html=""

positions.forEach(p=>{

html+=`<tr>
<td>${p.pair}</td>
<td>${p.type}</td>
<td>${p.price}</td>
<td>${p.pnl}</td>
</tr>`

})

document.getElementById("positions").innerHTML=html

}

</script>

<!-- AI ANALYSIS -->
<script>

function analyze(){

let txt=document.getElementById("aiInput").value

let rr=(Math.random()*5).toFixed(2)

document.getElementById("aiResult").innerHTML="Estimated RR: "+rr

}

</script>

<!-- CHAT (LOCAL DEMO) -->
<script>

function sendChat(){

let name=document.getElementById("chatName").value
let msg=document.getElementById("chatMsg").value

let div=document.createElement("div")
div.innerHTML="<b>"+name+":</b> "+msg

document.getElementById("chatBox").appendChild(div)

document.getElementById("chatMsg").value=""

}

</script>

</body>
  </html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVODA DEMO TRADING DASHBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;padding:0;font-family:'Orbitron',sans-serif;background:#0a0a0a;color:#fff;}
header{padding:20px;text-align:center;}
h1{color:#00ffcc;}
.btn{padding:10px 20px;background:#00ffcc;color:#000;border:none;cursor:pointer;margin:5px;}
#dashboard{padding:20px;}
.panel{background:#111;padding:15px;margin:10px 0;border-radius:8px;}
input,select{padding:8px;margin:5px;border-radius:5px;background:#222;color:#fff;border:1px solid #444;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #444;padding:5px;text-align:center;}
#backBtn{position:fixed;top:20px;left:20px;}
</style>
</head>
<body>

<header>
<h1>AVODA DEMO TRADING DASHBOARD</h1>
<button id="backBtn" class="btn" onclick="window.location.href='index.html'">BACK HOME</button>
</header>

<div id="dashboard">

<div class="panel">
<h2>Market Pair Selector</h2>
<select id="pairSelect">
<option value="BTC/USD">BTC/USD</option>
<option value="ETH/USD">ETH/USD</option>
<option value="GOLD/USD">GOLD/USD</option>
<option value="EUR/USD">EUR/USD</option>
<option value="USD/JPY">USD/JPY</option>
</select>
<input type="number" id="lotSize" placeholder="Lot Size" value="1">
<input type="number" id="leverage" placeholder="Leverage" value="1">
<button class="btn" onclick="placeTrade('BUY')">BUY</button>
<button class="btn" onclick="placeTrade('SELL')">SELL</button>
</div>

<div class="panel">
<h2>Trade Chart</h2>
<canvas id="tradeChart" height="200"></canvas>
</div>

<div class="panel">
<h2>Account & P/L</h2>
<p>Balance: $<span id="balance">10000</span></p>
<p>Equity: $<span id="equity">10000</span></p>
<p>Open P/L: $<span id="openPL">0</span></p>
</div>

<div class="panel">
<h2>Open Positions</h2>
<table id="positionsTable">
<tr><th>Pair</th><th>Type</th><th>Lot</th><th>Entry</th><th>Price</th><th>P/L</th></tr>
</table>
</div>

<div class="panel">
<h2>Trade History</h2>
<table id="historyTable">
<tr><th>Time</th><th>Pair</th><th>Type</th><th>Lot</th><th>Entry</th><th>Exit</th><th>P/L</th></tr>
</table>
</div>

</div>

<script>
// ==== DEMO DATA & STATE ====
let balance = 10000;
let equity = 10000;
let positions = [];
let history = [];
let chartData = {labels:[],datasets:[{label:'Price',borderColor:'#00ffcc',data:[],fill:false}]};
const ctx = document.getElementById('tradeChart').getContext('2d');
const tradeChart = new Chart(ctx,{type:'line',data:chartData,options:{responsive:true,scales:{x:{display:true},y:{display:true}}}});

// ==== FETCH PRICE (FREE APIs) ====
async function fetchPrice(pair){
    try{
        if(pair==='GOLD/USD'){
            const res = await fetch('https://www.metals-api.com/api/latest?access_key=demo&base=XAU&symbols=USD');
            const data = await res.json();
            return data.rates?.USD || 1800;
        } else if(pair==='EUR/USD' || pair==='USD/JPY'){
            const res = await fetch(`https://api.exchangerate.host/latest?base=${pair.split('/')[0]}&symbols=${pair.split('/')[1]}`);
            const data = await res.json();
            return data.rates[pair.split('/')[1]] || 1;
        } else {
            const symbol = pair.replace('/','');
            const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
            const data = await res.json();
            return parseFloat(data.price);
        }
    } catch(e){return 0;}
}

// ==== UPDATE CHART ====
async function updateChart(){
    const pair = document.getElementById('pairSelect').value;
    const price = await fetchPrice(pair);
    if(chartData.labels.length>20){chartData.labels.shift(); chartData.datasets[0].data.shift();}
    const now = new Date(); chartData.labels.push(now.toLocaleTimeString()); chartData.datasets[0].data.push(price);
    tradeChart.update();
    updatePositions(price);
}
setInterval(updateChart,2000);

// ==== PLACE TRADE ====
async function placeTrade(type){
    const pair = document.getElementById('pairSelect').value;
    const lot = parseFloat(document.getElementById('lotSize').value);
    const leverage = parseFloat(document.getElementById('leverage').value);
    const price = await fetchPrice(pair);
    const margin = (lot*price)/leverage;
    if(margin>balance){alert('Insufficient balance'); return;}
    balance -= margin;
    equity = balance;
    const pos = {pair,type,lot,entry:price,price,margin};
    positions.push(pos);
    updatePositions(price);
}

// ==== UPDATE POSITIONS & P/L ====
function updatePositions(currentPrice){
    let openPL = 0;
    const table = document.getElementById('positionsTable');
    table.innerHTML='<tr><th>Pair</th><th>Type</th><th>Lot</th><th>Entry</th><th>Price</th><th>P/L</th></tr>';
    positions.forEach((p,i)=>{
        const pl = (p.type==='BUY' ? (currentPrice-p.entry) : (p.entry-currentPrice))*p.lot;
        openPL += pl;
        table.innerHTML += `<tr><td>${p.pair}</td><td>${p.type}</td><td>${p.lot}</td><td>${p.entry.toFixed(2)}</td><td>${currentPrice.toFixed(2)}</td><td>${pl.toFixed(2)}</td></tr>`;
    });
    document.getElementById('openPL').innerText = openPL.toFixed(2);
    document.getElementById('balance').innerText = balance.toFixed(2);
    document.getElementById('equity').innerText = (balance+openPL).toFixed(2);
}
</script>

</body>
</html>

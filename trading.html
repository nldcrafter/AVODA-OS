<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVODA Trading Terminal PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#070707;
color:white;
font-family:Orbitron;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#111;
border-bottom:1px solid #222;
}

.container{
display:grid;
grid-template-columns:3fr 1fr;
grid-template-rows:auto auto;
gap:10px;
padding:10px;
}

.panel{
background:#0f0f0f;
padding:15px;
border-radius:8px;
border:1px solid #1e1e1e;
}

#chart{
height:520px;
}

input,select{
width:100%;
padding:6px;
margin-top:5px;
background:#111;
color:white;
border:1px solid #333;
}

button{
padding:8px;
margin-top:8px;
border:none;
cursor:pointer;
}

.buy{background:#16c784;color:black;}
.sell{background:#ea3943;color:white;}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #222;
font-size:12px;
}

.small{
font-size:12px;
color:#aaa;
}

#chatBox{
height:200px;
overflow-y:auto;
background:#000;
padding:8px;
}

</style>
</head>

<body>

<header>
<div>AVODA TRADING TERMINAL</div>
<div>
Balance: $<span id="balance">50</span> |
Equity: $<span id="equity">50</span>
</div>
</header>

<div class="container">

<!-- CHART -->
<div class="panel">
<h3>Trading Chart</h3>
<div id="chart"></div>
</div>

<!-- TRADE PANEL -->
<div class="panel">

<h3>Trade Execution</h3>

<label>Pair</label>
<select id="pair">
<option value="BTCUSDT">BTCUSDT</option>
<option value="ETHUSDT">ETHUSDT</option>
<option value="XAUUSD">GOLD</option>
<option value="NASDAQ">NASDAQ</option>
</select>

<label>Lot</label>
<input id="lot" value="0.01">

<label>Leverage</label>
<input id="lev" value="100">

<label>Entry Price</label>
<input id="price">

<label>Stop Loss</label>
<input id="sl">

<label>Take Profit</label>
<input id="tp">

<button class="buy" onclick="openTrade('BUY')">BUY</button>
<button class="sell" onclick="openTrade('SELL')">SELL</button>

<div class="small" id="marginInfo"></div>

</div>

<!-- OPEN POSITIONS -->
<div class="panel">

<h3>Open Positions</h3>

<table>
<thead>
<tr>
<th>Pair</th>
<th>Type</th>
<th>Entry</th>
<th>PnL</th>
</tr>
</thead>

<tbody id="positions"></tbody>

</table>

</div>

<!-- WATCHLIST -->
<div class="panel">

<h3>Market Watchlist</h3>

<table id="watchlist"></table>

</div>

<!-- TRADE HISTORY -->
<div class="panel">

<h3>Trade History</h3>

<table>
<thead>
<tr>
<th>Pair</th>
<th>Result</th>
<th>PnL</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<!-- HEATMAP -->
<div class="panel">

<h3>Crypto Market Movers</h3>
<table id="heatmap"></table>

</div>

<!-- ECONOMIC CALENDAR -->
<div class="panel">

<h3>Economic Calendar</h3>

<iframe src="https://tradingeconomics.com/calendar/widget?c=unitedstates"
width="100%" height="300"></iframe>

</div>

<!-- FEAR GREED -->
<div class="panel">

<h3>Fear & Greed</h3>
<div id="fear">Loading...</div>

</div>

<!-- AI ANALYSIS -->
<div class="panel">

<h3>AI Trade Assistant</h3>

<textarea id="aiInput" style="width:100%;height:70px"></textarea>
<button onclick="analyzeTrade()">Analyze</button>
<div id="aiOutput"></div>

</div>

<!-- CHAT -->
<div class="panel">

<h3>Trader Chat</h3>

<div id="chatBox"></div>

<input id="name" placeholder="Name">
<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>

</div>

</div>

<!-- TRADINGVIEW CHART -->
<script src="https://s3.tradingview.com/tv.js"></script>

<script>

new TradingView.widget({
container_id:"chart",
symbol:"BINANCE:BTCUSDT",
interval:"15",
theme:"dark",
style:"1",
locale:"en",
autosize:true
})

</script>

<!-- MARKET DATA -->
<script>

async function loadWatchlist(){

let res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd")
let data=await res.json()

let html=""
html+=`<tr><td>BTC</td><td>$${data.bitcoin.usd}</td></tr>`
html+=`<tr><td>ETH</td><td>$${data.ethereum.usd}</td></tr>`

document.getElementById("watchlist").innerHTML=html
}

loadWatchlist()
setInterval(loadWatchlist,10000)

</script>

<!-- HEATMAP -->
<script>

async function heatmap(){

let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=5&page=1")
let coins=await res.json()

let html=""

coins.forEach(c=>{
html+=`<tr>
<td>${c.symbol.toUpperCase()}</td>
<td>${c.price_change_percentage_24h.toFixed(2)}%</td>
</tr>`
})

document.getElementById("heatmap").innerHTML=html

}

heatmap()

</script>

<!-- FEAR GREED -->
<script>

async function fear(){

let res=await fetch("https://api.alternative.me/fng/")
let d=await res.json()

document.getElementById("fear").innerHTML=d.data[0].value+" / 100"

}

fear()

</script>

<!-- TRADE ENGINE -->
<script>

let balance=50
let positions=[]

function openTrade(type){

let pair=document.getElementById("pair").value
let price=parseFloat(document.getElementById("price").value)
let lot=parseFloat(document.getElementById("lot").value)
let lev=parseFloat(document.getElementById("lev").value)

let margin=(price*lot)/lev

document.getElementById("marginInfo").innerHTML="Margin required: $"+margin.toFixed(2)

positions.push({pair,type,price,pnl:0})

renderPositions()

}

function renderPositions(){

let html=""

positions.forEach(p=>{
html+=`<tr>
<td>${p.pair}</td>
<td>${p.type}</td>
<td>${p.price}</td>
<td>${p.pnl}</td>
</tr>`
})

document.getElementById("positions").innerHTML=html

}

</script>

<!-- AI ANALYSIS -->
<script>

function analyzeTrade(){

let txt=document.getElementById("aiInput").value

let rr=Math.random()*5

document.getElementById("aiOutput").innerHTML=
"Risk/Reward Estimate: "+rr.toFixed(2)

}

</script>

<!-- FIREBASE CHAT -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = YOUR_FIREBASE_CONFIG

firebase.initializeApp(firebaseConfig)

const db=firebase.database().ref("chat")

db.on("child_added",snap=>{
let m=snap.val()
let div=document.createElement("div")
div.innerHTML="<b>"+m.name+":</b> "+m.msg
document.getElementById("chatBox").appendChild(div)
})

function sendMsg(){

let name=document.getElementById("name").value
let msg=document.getElementById("msg").value

db.push({name,msg})

document.getElementById("msg").value=""

}

</script>

</body>
              </html>
